<div class="flex h-screen items-center justify-center bg-gray-100">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 m-6">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-800">FormFlow</h1>
      <p class="text-sm text-slate-500 mt-1">Login to your account</p>
    </div>

    <form (ngSubmit)="onLogin()" class="flex flex-col">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Username</mat-label>
        <input matInput type="text" [(ngModel)]="username" name="username" required />
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input
          matInput
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="6"
        />
      </mat-form-field>

      <button
        mat-raised-button
        type="submit"
        class="w-full h-11 text-base font-semibold btn-primary opacity-90 hover:opacity-100 cursor-pointer"
      >
        Login
      </button>
    </form>
    <app-google-auth-button></app-google-auth-button>
    <!-- <app-github-auth-button></app-github-auth-button> -->
    <div class="flex justify-center items-start mt-6">
      <a
        routerLink="/forgot-password"
        class="text-blue-500 text-sm underline opacity-80 cursor-pointer hover:opacity-100"
        >Forgot Password?</a
      >
    </div>
    <div class="flex justify-center items-center gap-3 mt-6">
      <span>Don't have an account? </span>
      <a
        routerLink="/signup"
        class="text-blue-500 underline opacity-80 cursor-pointer hover:opacity-100"
        >Sign Up</a
      >
    </div>
  </div>
</div>
