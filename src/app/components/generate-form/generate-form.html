<div class="fab-container">

  <!-- AI Button -->
  <button
    mat-fab
    class="generate-fab ai-btn"
    matTooltip="Generate form using AI"
    matTooltipPosition="left"
    (click)="openDialog()"
  >
    <mat-icon>auto_awesome</mat-icon>
  </button>

  <!-- Chat Button -->
  <button
    mat-fab
    class="generate-fab chat-btn"
    matTooltip="Chat Support"
    matTooltipPosition="left"
    (click)="openChat()"
  >
    <mat-icon>chat</mat-icon>
  </button>

</div>
